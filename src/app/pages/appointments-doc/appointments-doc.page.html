<ion-content class="main-content">
  <div class="hero-top">
    <div class="hero-shapes">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
    </div>

    <div class="header-navbar">
      <ion-button class="clean-header-btn">
        <ion-icon slot="icon-only" name="menu-outline"></ion-icon>
      </ion-button>
      
      <h1 class="app-title">MediSupport+</h1>

      <ion-button class="clean-header-btn">
        <ion-icon slot="icon-only" name="person-outline"></ion-icon>
      </ion-button>
    </div>
  </div>

  <div class="card-panel">
    <div class="card-inner animate-in">
      
      <header class="page-header">
        <h1 class="title-primary">Manage</h1>
        <h2 class="title-secondary">Medical Appointments</h2>
      </header>

      <section class="mission-section">
        <h3>Calendar</h3>
        <div class="calendar-wrapper">
          <ion-datetime 
            presentation="date" 
            [highlightedDates]="highlightedDates">
          </ion-datetime>
        </div>
      </section>

      <section class="mission-section">
        <h3>Pending Appointments</h3>
        
        <div class="requests-list">
          @for (req of appointmentRequests; track req.id) {
            <div class="appointment-card">
              
              <div class="patient-avatar">
                <span>{{ req.initial }}</span>
              </div>
              
              <div class="appt-details">
                <h4>{{ req.name }}</h4>
                <p class="datetime">{{ req.date }} | {{ req.time }}</p>
                <p class="reason">{{ req.reason }}</p>
              </div>

              <div class="appt-actions">
                <ion-button class="action-btn accept" (click)="acceptRequest(req.id)">
                  <ion-icon slot="icon-only" name="checkmark-outline"></ion-icon>
                </ion-button>
                <ion-button class="action-btn reject" (click)="rejectRequest(req.id)">
                  <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                </ion-button>
              </div>
              
            </div>
          }
        </div>
      </section>

    </div>

    <footer class="footer-copyright">
      <p>© 2026 MediSupport+</p>
      <div class="bottom-cross">
        <div class="h-line"></div>
        <div class="v-line"></div>
      </div>
    </footer>
  </div>
</ion-content>
